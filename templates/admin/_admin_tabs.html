{# Shared sys-admin tabs strip. Pass `active` = one of:
   'system_admin', 'health', 'invoices', 'dev_dashboard'
   to highlight the current tab. #}
<style>
  .admin-tabs { display:flex; gap:0; margin-bottom:24px; border-bottom:2px solid #ddd; }
  .admin-tabs a {
    padding:10px 20px; text-decoration:none; font-size:14px; font-weight:600;
    color:#555; border:1px solid #ddd; border-bottom:none;
    background:#f5f5f5; margin-right:4px; border-radius:6px 6px 0 0;
  }
  .admin-tabs a.active { background:#fff; color:#5a8a5d; border-bottom:2px solid #fff; margin-bottom:-2px; }
  .admin-tabs a:hover:not(.active) { background:#eee; }
  @media print { .admin-tabs { display:none; } }
</style>

<div class="admin-tabs">
  <a href="{{ url_for('admin_system_home') }}"
     class="{{ 'active' if active == 'system_admin' else '' }}">System Admin</a>
  <a href="{{ url_for('admin_system_health_overview') }}"
     class="{{ 'active' if active == 'health' else '' }}">Customer Health</a>
  <a href="{{ url_for('admin_system_invoices') }}"
     class="{{ 'active' if active == 'invoices' else '' }}">Invoices</a>
  <a href="{{ url_for('dev_dashboard') }}"
     class="{{ 'active' if active == 'dev_dashboard' else '' }}">Developer Dashboard</a>
</div>
